<!DOCTYPE html>

<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>PR-Монополия: Северный ветер</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#040D18;color:#E8F0FE;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh;overflow-x:hidden}
.stars{position:fixed;inset:0;pointer-events:none;z-index:0;background:radial-gradient(ellipse at 20% 30%,rgba(0,80,120,.15) 0%,transparent 60%),radial-gradient(ellipse at 80% 70%,rgba(0,60,100,.1) 0%,transparent 60%)}
.stars::before{content:'';position:absolute;inset:0;background-image:radial-gradient(1px 1px at 10% 15%,rgba(255,255,255,.6) 0%,transparent 100%),radial-gradient(1px 1px at 25% 45%,rgba(255,255,255,.4) 0%,transparent 100%),radial-gradient(1px 1px at 42% 22%,rgba(255,255,255,.5) 0%,transparent 100%),radial-gradient(1px 1px at 60% 62%,rgba(255,255,255,.3) 0%,transparent 100%),radial-gradient(1px 1px at 75% 33%,rgba(255,255,255,.5) 0%,transparent 100%),radial-gradient(1.5px 1.5px at 35% 68%,rgba(0,229,204,.4) 0%,transparent 100%),radial-gradient(1.5px 1.5px at 66% 14%,rgba(0,229,204,.3) 0%,transparent 100%),radial-gradient(1px 1px at 52% 88%,rgba(255,255,255,.35) 0%,transparent 100%)}
.aurora{position:fixed;top:0;left:0;right:0;height:35vh;background:linear-gradient(180deg,rgba(0,229,204,.07) 0%,transparent 100%);animation:aurora 8s ease-in-out infinite;pointer-events:none;z-index:0}
.z1{position:relative;z-index:1}
@keyframes aurora{0%,100%{opacity:.3;transform:translateX(-8%) scaleY(1)}50%{opacity:.65;transform:translateX(5%) scaleY(1.1)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes scaleIn{from{opacity:0;transform:scale(.93)}to{opacity:1;transform:scale(1)}}
@keyframes cardFlip{from{opacity:0;transform:rotateY(70deg) scale(.92)}to{opacity:1;transform:rotateY(0) scale(1)}}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-5px)}40%{transform:translateX(5px)}60%{transform:translateX(-3px)}80%{transform:translateX(3px)}}
@keyframes popIn{0%{opacity:0;transform:scale(.7)}70%{transform:scale(1.06)}100%{opacity:1;transform:scale(1)}}
.afu{animation:fadeUp .45s ease both}.asi{animation:scaleIn .38s ease both}.acf{animation:cardFlip .5s ease both}.api{animation:popIn .32s ease both}
.d1{animation-delay:.08s}.d2{animation-delay:.16s}.d3{animation-delay:.24s}.d4{animation-delay:.32s}
.wrap{max-width:680px;margin:0 auto;padding:18px 14px 40px}
.center{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:24px}
.card{background:rgba(10,22,46,.85);border:1px solid rgba(255,255,255,.07);border-radius:20px;backdrop-filter:blur(12px)}
.btn{cursor:pointer;border:none;font-family:inherit;font-weight:600;transition:all .2s;outline:none}
.btn:active{transform:scale(.97)}
.bp{background:linear-gradient(135deg,#00E5CC,#0098A6);color:#040D18;border-radius:14px;padding:15px 34px;font-size:16px;box-shadow:0 8px 24px rgba(0,229,204,.22)}
.bp:hover{box-shadow:0 12px 32px rgba(0,229,204,.38);transform:translateY(-2px)}
.bc{background:rgba(255,184,0,.1);border:2px solid #FFB800;color:#FFB800;border-radius:14px;padding:13px 26px;font-size:15px;font-weight:600;cursor:pointer;font-family:inherit}
.bc:hover{background:rgba(255,184,0,.2)}
.bo{background:transparent;border:2px solid #00E5CC;color:#00E5CC;border-radius:13px;padding:13px 34px;font-size:14px}
.opt{width:100%;padding:16px 18px;border-radius:13px;background:rgba(8,18,40,.85);border:2px solid rgba(255,255,255,.07);text-align:left;cursor:pointer;transition:all .22s;font-family:inherit;color:#E8F0FE}
.opt:hover:not(:disabled){border-color:rgba(0,229,204,.38);background:rgba(0,229,204,.04);transform:translateX(3px)}
.opt:disabled{cursor:default}
.og{border-color:#22C55E!important;background:rgba(34,197,94,.08)!important;animation:scaleIn .28s ease}
.oy{border-color:#F59E0B!important;background:rgba(245,158,11,.08)!important;animation:shake .38s ease}
.or{border-color:#EF4444!important;background:rgba(239,68,68,.08)!important;animation:shake .38s ease}
.rg{border-color:rgba(34,197,94,.22)!important}.ry{border-color:rgba(245,158,11,.18)!important}.rr{border-color:rgba(239,68,68,.18)!important}
.pb{height:3px;background:rgba(255,255,255,.05);border-radius:2px;overflow:hidden}
.pf{height:100%;border-radius:2px;background:linear-gradient(90deg,#00E5CC,#0098A6);transition:width .6s ease}
.sb{height:4px;background:rgba(255,255,255,.05);border-radius:2px;overflow:hidden}
.sf{height:100%;border-radius:2px;transition:width .5s ease}
input{width:100%;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);border-radius:10px;padding:11px 14px;color:#E8F0FE;font-size:15px;outline:none;font-family:inherit;transition:border .2s}
input:focus{border-color:#00E5CC}
.lock{position:fixed;inset:0;z-index:500;background:rgba(4,13,24,.97);display:flex;flex-direction:column;align-items:center;justify-content:center;backdrop-filter:blur(8px)}
#mb{position:fixed;top:14px;right:14px;z-index:400;background:rgba(8,20,46,.9);border:1px solid rgba(255,255,255,.1);border-radius:10px;padding:6px 12px;font-size:12px;font-weight:600;cursor:pointer;backdrop-filter:blur(8px);transition:all .2s;color:rgba(255,255,255,.45);font-family:inherit}
#mb.on{border-color:rgba(0,229,204,.4);color:#00E5CC}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:rgba(0,229,204,.3);border-radius:2px}
</style>
</head>
<body>
<div class="stars"></div><div class="aurora"></div>
<div id="root"></div>

<script>
const TP=[
  {color:'#00E5CC',glow:'rgba(0,229,204,.28)',bg:'rgba(0,229,204,.08)'},
  {color:'#FF6B9D',glow:'rgba(255,107,157,.28)',bg:'rgba(255,107,157,.08)'},
  {color:'#FFB800',glow:'rgba(255,184,0,.28)',bg:'rgba(255,184,0,.08)'},
];

const BC=[
  {id:'b1',type:'blue',e:'📱',title:'Гневный отзыв',
   text:'Клиент написал в соцсетях: «Мне обещали фотосессию на льдине, а по приезду сказали — это платно». Пост набирает репосты.',
   opts:[
     {t:'bad', tx:'Нанять людей, которые завалят комментарии позитивом и потребовать удалить пост.',v:'❌ Нарушение',c:'п. 6.6 АКОС — анонимные агенты влияния',bB:32,rB:-42},
     {t:'gray',tx:'Ответить шаблонным «Спасибо за обратную связь» и больше не реагировать.',v:'⚠️ Серая зона',c:'п. 2.2.3 АКОС — несоблюдение обязательств',bB:12,rB:-14},
     {t:'good',tx:'Публично признать ошибку, предложить компенсацию и пересмотреть рекламные материалы.',v:'✅ Этично',c:'п. 2.2.4 АКОС — максимальная прозрачность',bB:-6,rB:28},
   ]},
  {id:'b2',type:'blue',e:'📊',title:'Фейковый рейтинг',
   text:'PR-директор предлагает создать «независимый Рейтинг арктических агентств», где агентство — первое, конкуренты — в хвосте. Распространить через тревел-блогеров.',
   opts:[
     {t:'bad', tx:'Запустить рейтинг — стандартная практика, никто не проверит.',v:'❌ Нарушение',c:'п. 2.3.4 АКОС + ст. 14.3 ФЗ «О защите конкуренции»',bB:38,rB:-46},
     {t:'gray',tx:'Создать рейтинг, но без явного упоминания конкурентов.',v:'⚠️ Серая зона',c:'п. 5.5 АКОС — публикация под вымышленным именем',bB:17,rB:-16},
     {t:'good',tx:'Отказаться. Вместо этого — честное сравнение своих пакетов с рынком от своего имени.',v:'✅ Этично',c:'п. 5.6 АКОС — действовать от своего имени',bB:-4,rB:22},
   ]},
  {id:'b3',type:'blue',e:'📰',title:'Нативная статья',
   text:'Редактор тревел-журнала предлагает материал «Топ-5 арктических туров», где агентство на первом месте. Без пометки «реклама».',
   opts:[
     {t:'bad', tx:'Согласиться — нативная реклама так и работает.',v:'❌ Нарушение',c:'п. 5.2 и п. 6.9 АКОС — скрытая реклама',bB:29,rB:-37},
     {t:'gray',tx:'Разместить с мелкой сноской «при поддержке» в самом конце.',v:'⚠️ Серая зона',c:'п. 5.2 АКОС — маркировка должна быть явной',bB:13,rB:-11},
     {t:'good',tx:'Настоять на полноценной пометке «Реклама» и честном тексте.',v:'✅ Этично',c:'п. 5.2 АКОС + ФЗ «О рекламе»',bB:-7,rB:26},
   ]},
  {id:'b4',type:'blue',e:'🔍',title:'Журналист расследует',
   text:'Журналист уже знает детали схемы с фейковым рейтингом. Завтра выходит материал.',
   opts:[
     {t:'bad', tx:'Отрицать всё и пригрозить изданию судебным иском.',v:'❌ Нарушение',c:'п. 3.2 АКОС — распространение ложной информации',bB:9,rB:-52},
     {t:'gray',tx:'Без комментариев. Просто переждать.',v:'⚠️ Серая зона',c:'п. 5.3 АКОС — обязательство давать СМИ объективную информацию',bB:0,rB:-18},
     {t:'good',tx:'Дать полный комментарий, признать нарушения и объявить о реформе коммуникационной политики.',v:'✅ Этично',c:'п. 5.3 АКОС — всестороннее взаимодействие со СМИ',bB:-11,rB:33},
   ]},
];

const RC=[
  {id:'r1',type:'red',e:'⚖️',title:'Конфликт интересов',
   text:'Вы ведёте крупного клиента. Узнаёте, что конкурент готов заплатить вдвое больше за такую же работу. Оба на туристическом рынке.',
   opts:[
     {t:'bad', tx:'Тихо переключиться на нового клиента, не уведомив текущего.',v:'❌ Нарушение',c:'п. 2.2.4 АКОС — прозрачность и конфиденциальность',bB:41,rB:-38},
     {t:'gray',tx:'Попробовать вести обоих, не раскрывая конфликт.',v:'⚠️ Серая зона',c:'п. 2.1 АКОС — принцип честности',bB:19,rB:-22},
     {t:'good',tx:'Раскрыть конфликт интересов текущему клиенту и дать ему выбор.',v:'✅ Этично',c:'п. 2.1 АКОС — честность как основной принцип',bB:-8,rB:31},
   ]},
  {id:'r2',type:'red',e:'🎙️',title:'Правда вредит',
   text:'Журналист просит комментарий о качестве услуг вашего клиента. Правдивый ответ навредит его репутации. Клиент просит уклониться.',
   opts:[
     {t:'bad', tx:'Дать заведомо ложный комментарий в выгодном для клиента свете.',v:'❌ Нарушение',c:'п. 5.4 АКОС — запрет на ложную информацию через СМИ',bB:27,rB:-34},
     {t:'gray',tx:'Отказаться от комментария без объяснений.',v:'⚠️ Серая зона',c:'п. 5.3 АКОС — обязательство давать объективную информацию',bB:6,rB:-9},
     {t:'good',tx:'Дать нейтральный фактически точный комментарий. Если клиент настаивает на лжи — отказаться от контракта.',v:'✅ Этично',c:'п. 5.3 + п. 2.1 АКОС',bB:-14,rB:36},
   ]},
  {id:'r3',type:'red',e:'🤖',title:'ИИ-армия ботов',
   text:'Предлагают запустить сотни постов, написанных ИИ от имени «реальных пользователей», восхваляющих продукт клиента.',
   opts:[
     {t:'bad', tx:'Запустить — пользователи всё равно не узнают.',v:'❌ Нарушение',c:'п. 8.7 АКОС — запрет ИИ для манипуляции',bB:43,rB:-47},
     {t:'gray',tx:'Использовать ИИ для контента, но не скрывать источник.',v:'⚠️ Серая зона',c:'п. 8.4 АКОС — необходимо указывать использование ИИ',bB:14,rB:-6},
     {t:'good',tx:'Отказаться. Предложить честную контент-стратегию с реальными амбассадорами.',v:'✅ Этично',c:'п. 8.1 + п. 8.7 АКОС',bB:-5,rB:24},
   ]},
  {id:'r4',type:'red',e:'🌿',title:'Вайтвошинг',
   text:'Клиент хочет объявить себя «эко-агентством» и запустить кампанию «За чистую Арктику». Реальных изменений не планируется.',
   opts:[
     {t:'bad', tx:'Запустить кампанию — это просто имиджевый ход.',v:'❌ Нарушение',c:'п. 9.11 АКОС — экологические темы должны быть достоверными',bB:33,rB:-41},
     {t:'gray',tx:'Запустить с расплывчатыми обещаниями «наших планов».',v:'⚠️ Серая зона',c:'п. 5.4 АКОС — вводящая в заблуждение информация',bB:16,rB:-13},
     {t:'good',tx:'Отказаться до внедрения реальных практик. Предложить помощь в их разработке.',v:'✅ Этично',c:'п. 9.2 + п. 9.11 АКОС',bB:-9,rB:29},
   ]},
];

const CC=[
  {e:'💥',title:'Утечка переписки',text:'Бывший сотрудник слил в сеть переписку, где PR-директор обсуждает схему с фейковым рейтингом. Публикация набирает тысячи просмотров.'},
  {e:'⚡',title:'Дело ФАС',text:'ФАС возбудила дело против агентства по факту недобросовестной конкуренции. Журналисты звонят за комментарием. Репутация падает в поисковой выдаче.'},
];

// Утилиты
const sfl=a=>{const b=[...a];for(let i=b.length-1;i>0;i--){const j=0|Math.random()*(i+1);[b[i],b[j]]=[b[j],b[i]]}return b};
const jt=v=>{const s=Math.abs(v)*.26,d=Math.round((Math.random()*s*2-s)/2)*2;return v+d};
const esc=s=>String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const vc=v=>v.startsWith('✅')?'#4ADE80':v.startsWith('⚠️')?'#F59E0B':'#F87171';

function mkCard(raw){
  return {...raw,opts:sfl(raw.opts).map((o,i)=>({...o,label:['А','Б','В'][i],budget:jt(o.bB),rep:jt(o.rB)}))};
}

// Состояние
let G={
  scr:'setup',
  pwd:'',unlocked:true,pwdErr:false,
  nT:3,sN:['','',''],sPwd:'',
  teams:[],deck:[],di:0,cdeck:[],ci:0,
  cur:0,phase:'idle',card:null,chosen:null,
  timer:30,tmax:30,trun:false,
  ccard:null,votes:[0,0,0],round:1,total:6,
};
let TI=null;

// Таймер
function startT(){clearInterval(TI);G.trun=true;TI=setInterval(()=>{if(G.timer>0){G.timer--;updT();}else{clearInterval(TI);G.trun=false;updT();}},1000);}
function pauseT(){clearInterval(TI);G.trun=false;updT();}
function updT(){
  const r=document.getElementById('trf'),tx=document.getElementById('ttx'),pb=document.getElementById('tpb');
  if(!r||!tx)return;
  const p=G.timer/G.tmax,rv=24,c=2*Math.PI*rv,col=p>.4?G.teams[G.cur].color:p>.2?'#F59E0B':'#EF4444';
  r.style.strokeDashoffset=c*(1-p);r.style.stroke=col;tx.textContent=G.timer;tx.style.color=col;
  if(pb)pb.textContent=G.trun?(G.phase==='crisis'?'⏸ Пауза':'⏸'):(G.phase==='crisis'?'▶ Старт':'▶');
}

// Вспомогательные рендеры
function sbar(v,lbl,col,ic){
  return`<div style="flex:1"><div style="display:flex;justify-content:space-between;margin-bottom:4px"><span style="font-size:10px;color:rgba(255,255,255,.32);letter-spacing:1px;text-transform:uppercase">${ic} ${lbl}</span><span style="font-size:17px;font-weight:700;color:${col}">${v}</span></div><div class="sb"><div class="sf" style="width:${Math.min(100,v/2)}%;background:${col}"></div></div></div>`;
}

function tcard(t,i,act){
  return`<div style="flex:1;min-width:130px;border-radius:14px;padding:13px;border:1px solid ${act?t.color:'rgba(255,255,255,.05)'};background:rgba(8,16,36,.72);transition:all .3s;box-shadow:${act?`0 0 20px ${t.glow},inset 0 0 16px rgba(0,0,0,.3)`:'none'}">
    <div style="display:flex;align-items:center;gap:7px;margin-bottom:10px">
      <div style="width:7px;height:7px;border-radius:50%;background:${t.color};${act?`box-shadow:0 0 8px ${t.color}`:''}"></div>
      <div style="font-size:12px;font-weight:600;color:${act?t.color:'rgba(255,255,255,.6)'};overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1">${esc(t.name)}</div>
      ${act?`<div style="font-size:9px;color:${t.color};letter-spacing:1px;text-transform:uppercase;flex-shrink:0">ХОД</div>`:''}
    </div>
    <div style="display:flex;flex-direction:column;gap:7px">${sbar(t.budget,'Бюджет','#4ADE80','💰')}${sbar(t.rep,'Репутация','#C084FC','⭐')}</div>
  </div>`;
}

function tring(s,mx,col){
  const rv=24,c=2*Math.PI*rv,p=s/mx,clr=p>.4?col:p>.2?'#F59E0B':'#EF4444';
  return`<div style="position:relative;width:58px;height:58px;flex-shrink:0"><svg width="58" height="58" style="transform:rotate(-90deg)"><circle cx="29" cy="29" r="${rv}" fill="none" stroke="rgba(255,255,255,.05)" stroke-width="3"/><circle id="trf" cx="29" cy="29" r="${rv}" fill="none" stroke="${clr}" stroke-width="3" stroke-dasharray="${c}" stroke-dashoffset="${c*(1-p)}" stroke-linecap="round" style="transition:stroke-dashoffset 1s linear,stroke .3s"/></svg><div id="ttx" style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;color:${clr}">${s}</div></div>`;
}

// Экраны
function rSetup(){
  const n=G.nT;
  let inp='';
  for(let i=0;i<n;i++)inp+=`<div style="display:flex;align-items:center;gap:9px;margin-bottom:9px"><div style="width:9px;height:9px;border-radius:50%;background:${TP[i].color};flex-shrink:0"></div><input type="text" id="tn${i}" value="${esc(G.sN[i])}" placeholder="Придумайте название агентства..." /></div>`;
  return`<div class="z1 center">
    <div class="afu" style="text-align:center;margin-bottom:36px">
      <div style="font-size:11px;letter-spacing:5px;color:#00E5CC;margin-bottom:10px;text-transform:uppercase;opacity:.8">Интерактивная игра</div>
      <h1 style="font-family:Georgia,serif;font-size:clamp(28px,5vw,48px);line-height:1.1;margin-bottom:10px;font-weight:700">PR-Монополия<br><span style="color:#00E5CC">Северный ветер</span></h1>
      <p style="color:rgba(255,255,255,.38);font-size:14px;max-width:380px">Кто докажет: быть честным — выгоднее, чем манипулировать?</p>
    </div>
    <div class="card afu d2" style="width:100%;max-width:440px;padding:28px">
      <div style="margin-bottom:22px">
        <div style="font-size:10px;letter-spacing:3px;color:rgba(255,255,255,.28);text-transform:uppercase;margin-bottom:12px">Число команд</div>
        <div style="display:flex;gap:10px">
          <button class="btn" onclick="sTC(2)" style="flex:1;padding:13px 0;border-radius:11px;font-size:20px;font-weight:700;border:2px solid ${n===2?'#00E5CC':'rgba(255,255,255,.07)'};background:${n===2?'rgba(0,229,204,.09)':'transparent'};color:${n===2?'#00E5CC':'rgba(255,255,255,.28)'}">2</button>
          <button class="btn" onclick="sTC(3)" style="flex:1;padding:13px 0;border-radius:11px;font-size:20px;font-weight:700;border:2px solid ${n===3?'#00E5CC':'rgba(255,255,255,.07)'};background:${n===3?'rgba(0,229,204,.09)':'transparent'};color:${n===3?'#00E5CC':'rgba(255,255,255,.28)'}">3</button>
        </div>
      </div>
      <div style="margin-bottom:22px">

function rGame(){

    ph=`<div class="acf"><div class="card" style="padding:22px 22px 26px">

  else if(G.phase==='crisis'){

          </div>
        </div>
      </div>
      <button class="btn" onclick="MA('gv')" style="background:#FFB800;color:#1C1205;border-radius:12px;padding:13px 30px;font-size:15px;font-weight:700">Голосование →</button>

  }

  else if(G.phase==='vote'){
    let vb='';
    G.teams.forEach((t,i)=>{vb+=`<button class="btn" onclick="MA('vt',${i})" style="padding:14px 18px;border-radius:12px;border:2px solid ${t.color};background:${G.votes[i]>0?t.bg:'transparent'};color:${t.color};display:flex;justify-content:space-between;align-items:center;font-size:14px;font-weight:600;width:100%"><span>${esc(t.name)}</span><span style="background:${t.color}22;padding:3px 13px;border-radius:20px;font-size:15px;font-weight:700">${G.votes[i]}</span></button>`;});
    ph=`<div class="card asi" style="padding:30px;text-align:center">
      <div style="font-size:10px;letter-spacing:4px;color:#FFB800;text-transform:uppercase;margin-bottom:7px">Голосование аудитории</div>
      <h2 style="font-family:Georgia,serif;font-size:20px;font-weight:700;margin-bottom:5px">Чей ответ убедил больше всего?</h2>
      <p style="color:rgba(255,255,255,.28);font-size:12px;margin-bottom:24px">+30 к репутации победителя</p>
      <div style="display:flex;flex-direction:column;gap:9px;margin-bottom:22px">${vb}</div>
      <button class="btn bp" onclick="MA('ev')">Завершить раунд →</button>

  return`<div class="z1 wrap">
    <div style="display:flex;gap:9px;margin-bottom:16px;flex-wrap:wrap">${sb}</div>

      <div style="display:flex;justify-content:space-between;margin-top:5px;font-size:10px;color:rgba(255,255,255,.2);letter-spacing:1px"><span>РАУНД ${G.round} / ${G.total}</span><span>${pr}%</span></div></div>
    ${ph}
  </div>`;
}

  let rows='';
  s.forEach((t,i)=>{const tot=t.budget+t.rep;rows+=`<div class="card afu" style="padding:16px 20px;border-color:${i===0?t.color:'rgba(255,255,255,.06)'};box-shadow:${i===0?`0 0 28px ${t.glow}`:'none'};animation-delay:${i*.1}s;opacity:0">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:9px">
      <div style="display:flex;gap:9px;align-items:center"><span style="color:rgba(255,255,255,.2);font-size:20px;font-weight:700">#${i+1}</span><div style="width:8px;height:8px;border-radius:50%;background:${t.color}"></div><span style="color:${t.color};font-weight:700">${esc(t.name)}</span></div>

    <div style="display:flex;gap:14px"><span style="font-size:11px;color:#4ADE80">💰 ${t.budget}</span><span style="font-size:11px;color:#C084FC">⭐ ${t.rep}</span></div>
  </div>`;});
  return`<div class="z1 center"><div style="max-width:520px;width:100%">
    <div class="afu" style="text-align:center;margin-bottom:32px">
      <div style="font-size:44px;margin-bottom:10px">🏆</div>
      <div style="font-size:10px;letter-spacing:5px;color:#00E5CC;text-transform:uppercase;margin-bottom:7px">Игра окончена</div>
      <h1 style="font-family:Georgia,serif;font-size:30px;font-weight:700">Победитель:<br><span style="color:${w.color}">${esc(w.name)}</span></h1>
      <div style="color:rgba(255,255,255,.28);margin-top:5px;font-size:13px">${w.budget+w.rep} очков</div>

    <button class="btn bo afu d4" onclick="restG()" style="opacity:0;width:100%;text-align:center">↺ Сыграть заново</button>

}

function rLock(){
  if(G.unlocked||G.scr!=='game')return'';
  return`<div class="lock">
    <div style="font-size:64px;margin-bottom:16px">🔒</div>
    <div style="font-family:Georgia,serif;font-size:28px;font-weight:700;margin-bottom:8px">Игра заблокирована</div>

      <input type="password" id="ulpw" placeholder="Введите пароль модератора..." style="margin-bottom:12px;text-align:center;font-size:15px" onkeydown="if(event.key==='Enter')ulk()"/>
      ${G.pwdErr?'<div style="color:#F87171;font-size:12px;text-align:center;margin-bottom:10px">Неверный пароль</div>':''}

function rMB(){
  if(G.scr!=='game')return'';
  return`<button id="mb" class="${G.unlocked?'on':''}" onclick="togML()">${G.unlocked?'🔓 МОД':'🔒 БЛОК'}</button>`;
}

function R(){
  let h='';
  if(G.scr==='setup')h=rSetup();
  else if(G.scr==='intro')h=rIntro();
  else if(G.scr==='game')h=rGame();
  else if(G.scr==='end')h=rEnd();
  document.getElementById('root').innerHTML=h+rMB()+rLock();
}

// Действия
function MA(a,d){if(!G.unlocked){R();return;}XA(a,d);}
function XA(a,d){
  clearInterval(TI);
  if(a==='dc'){
    G.card=mkCard(G.deck[G.di%G.deck.length]);G.di++;
    G.chosen=null;G.timer=30;G.tmax=30;G.phase='card';R();startT();
  }else if(a==='dcc'){
    G.ccard=G.cdeck[G.ci%G.cdeck.length];G.ci++;
    G.teams[G.cur].crisisUsed=true;G.timer=60;G.tmax=60;G.phase='crisis';R();
  }else if(a==='tt'){
    G.trun?pauseT():startT();updT();
  }else if(a==='rc'){
    G.timer=60;G.trun=false;updT();
  }else if(a==='ch'){
    const o=G.card.opts[d];G.chosen=d;pauseT();
    const t=G.teams[G.cur];
    t.budget=Math.max(0,Math.min(200,t.budget+o.budget));
    t.rep=Math.max(0,Math.min(200,t.rep+o.rep));
    G.phase='result';R();showDP(o.budget,o.rep,t.name,t.color);
  }else if(a==='nx'){
    if(G.round>=G.total){G.scr='end';R();return;}
    G.round++;G.cur=(G.cur+1)%G.teams.length;
    G.phase='idle';G.card=null;G.chosen=null;R();
  }else if(a==='gv'){
    G.phase='vote';R();
  }else if(a==='vt'){
    G.votes[d]++;R();
  }else if(a==='ev'){
    const mx=Math.max(...G.votes.slice(0,G.teams.length));
    if(mx>0)G.teams.forEach((t,i)=>{if(G.votes[i]===mx)t.rep=Math.min(200,t.rep+30);});
    G.votes=[0,0,0];XA('nx');
  }
}

// Блокировка
function togML(){
  if(G.unlocked){G.unlocked=false;clearInterval(TI);R();setTimeout(()=>{const i=document.getElementById('ulpw');if(i)i.focus();},80);}
  else{G.pwdErr=false;R();setTimeout(()=>{const i=document.getElementById('ulpw');if(i)i.focus();},80);}
}
function ulk(){
  const i=document.getElementById('ulpw');if(!i)return;
  if(i.value===G.pwd){G.unlocked=true;G.pwdErr=false;R();if(G.phase==='card'||G.phase==='crisis')startT();}
  else{G.pwdErr=true;R();setTimeout(()=>{const i2=document.getElementById('ulpw');if(i2){i2.value='';i2.focus();}},50);}
}

// Попап изменения очков
let DT=null;
function showDP(b,r,nm,col){
  clearTimeout(DT);const ex=document.getElementById('dp');if(ex)ex.remove();
  const d=document.createElement('div');d.id='dp';
  d.style.cssText='position:fixed;top:18px;right:18px;z-index:300;background:rgba(6,16,38,.96);border:1px solid rgba(0,229,204,.18);border-radius:13px;padding:12px 18px;backdrop-filter:blur(14px);animation:popIn .3s ease';
  d.innerHTML=`<div style="font-size:11px;color:rgba(255,255,255,.35);margin-bottom:5px">${esc(nm)}</div><div style="display:flex;gap:10px"><span style="font-weight:700;font-size:15px;color:${b>=0?'#4ADE80':'#F87171'}">💰 ${b>=0?'+':''}${b}</span><span style="font-weight:700;font-size:15px;color:${r>=0?'#C084FC':'#F87171'}">⭐ ${r>=0?'+':''}${r}</span></div>`;
  document.body.appendChild(d);DT=setTimeout(()=>d.remove(),2800);
}

// Сохранение значений формы
function saveV(){
  const pw=document.getElementById('mpw');if(pw)G.sPwd=pw.value;
  for(let i=0;i<3;i++){const n=document.getElementById('tn'+i);if(n)G.sN[i]=n.value;}
}
function sTC(n){saveV();G.nT=n;R();}

function startG(){
  const pw=document.getElementById('mpw');
  const p=pw?pw.value.trim():'';
  if(!p){alert('Пожалуйста, придумайте пароль модератора!');return;}
  const names=[];
  for(let i=0;i<G.nT;i++){const ni=document.getElementById('tn'+i);names.push(ni&&ni.value.trim()?ni.value.trim():`Агентство ${i+1}`);}
  G.pwd=p;G.unlocked=true;
  G.teams=TP.slice(0,G.nT).map((t,i)=>({...t,name:names[i],budget:100,rep:100,crisisUsed:false}));
  G.deck=sfl([...BC,...BC,...RC,...RC]);
  G.cdeck=sfl([...CC]);
  G.di=0;G.ci=0;G.cur=0;G.phase='idle';G.card=null;G.chosen=null;
  G.round=1;G.total=G.nT*2;G.votes=[0,0,0];G.scr='intro';R();
}

function restG(){clearInterval(TI);G.scr='setup';G.sPwd=G.pwd;G.nT=G.teams.length;G.sN=G.teams.map(t=>t.name);R();}

R();
</script>
